name: PR

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    # Default types (opened, synchronize, reopened) — explicit for clarity.
    # `closed` is intentionally excluded so merges/closures do not re-run CI.
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Non-wasm CI feature bundle. `--all-features` clashes with the
  # systemd <-> wasm32 compile_error invariant. Kept in sync with the
  # `ci_features` variable in the Justfile.
  CI_FEATURES: systemd,with-actix-web,with-otlp

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just fmt-check

  lint-md:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just lint-md

  lint-rs:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just lint-rs

  test:
    name: test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        profile: [default, systemd, all]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: just test (default)
        if: matrix.profile == 'default'
        run: just test
      - name: just test-systemd
        if: matrix.profile == 'systemd'
        run: just test-systemd
      - name: just test-all
        if: matrix.profile == 'all'
        run: just test-all

  build-wasm:
    name: build wasm32
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just build-wasm

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # MSRV job pre-activates Rust 1.88 via dtolnay action, so call cargo
      # directly (the `just msrv` recipe re-activates via `rustup run`).
      - name: check (default)
        run: cargo check
      - name: check (full feature bundle)
        run: cargo check --features ${{ env.CI_FEATURES }}

  docs:
    name: docs
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just doc-check

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,just
      - uses: Swatinem/rust-cache@v2
      - name: just coverage-ci
        run: just coverage-ci
      - name: Upload to Codecov
        # `secrets.*` is not available in step-level `if:`, so we expose the
        # token via env and gate on its emptiness (fork PRs see no token).
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.SECRET_CODECOV_TOKEN }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.SECRET_CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,just
      # Cargo.lock is gitignored (library convention) - generate before audit.
      - run: cargo generate-lockfile
      - run: just audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v5
      # `hashFiles` is not allowed in job-level `if:`, so gate inside a
      # step. Subsequent steps no-op when `deny.toml` is absent.
      - id: check
        run: |
          if [ -f deny.toml ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "deny.toml not present; skipping cargo deny."
          fi
      - if: steps.check.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.check.outputs.run == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,just
      - if: steps.check.outputs.run == 'true'
        run: just deny

  semver:
    name: semver-checks
    runs-on: ubuntu-latest
    needs: fmt
    # Only meaningful for PRs; on direct pushes to main the baseline equals HEAD.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: only-explicit-features
          features: systemd,with-actix-web,with-otlp
